spring:
  application:
    name: inventory-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

application:
  jwt:
    # Must be a Base64-encoded string of at least 32 bytes.
    # Generate with: openssl rand -base64 32
    secret: ${JWT_SECRET:c2VjcmV0S2V5Rm9ySW52ZW50b3J5TWFuYWdlbWVudEFwaTIwMjRMb25nRW5vdWdo}
    expiration: ${JWT_EXPIRATION_MS:86400000}   # 24 h

logging:
  level:
    root: INFO
    com.inventory: DEBUG
